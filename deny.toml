# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/checks/cfg.html

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "warn"
ignore = [
  # `rsa 0.9.x` is transitive via `sqlx-mysql`. Marvin Attack is a
  # remote timing sidechannel; sqeel only opens local DB sessions
  # under user control, so the threat model doesn't apply. No safe
  # upgrade exists yet — track upstream RSA crate progress.
  { id = "RUSTSEC-2023-0071", reason = "transitive via sqlx-mysql; no fixed version available" },
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "ISC",
  "MPL-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "CC0-1.0",
  # webpki-roots 0.26 / 1.0 — Mozilla's CA bundle, transitive via
  # sqlx → rustls. Permissive license; same intent as MIT/BSD.
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
