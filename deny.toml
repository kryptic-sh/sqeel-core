# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/checks/cfg.html

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "warn"
ignore = [
  # `paste` is unmaintained but only pulled transitively by ratatui.
  # No replacement exists in ratatui's tree; the macro is a stable
  # build-time helper. Re-evaluate when ratatui drops the dep.
  { id = "RUSTSEC-2024-0436", reason = "transitive via ratatui — accept until ratatui drops paste" },
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "ISC",
  "MPL-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
